<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connected</title>
  <meta http-equiv="refresh" content="3; url=$(link-status)" />
  <style>
    :root {
      --ink: #102235;
      --muted: #54657c;
      --panel: rgba(252, 253, 255, 0.94);
      --line: rgba(17, 45, 76, 0.14);
      --accent: #0f6acb;
      --success: #147a43;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 16%, rgba(238, 185, 62, 0.32), transparent 32%),
        radial-gradient(circle at 84% 10%, rgba(66, 136, 223, 0.28), transparent 30%),
        linear-gradient(135deg, #fff5d9 0%, #f7fafc 46%, #dcebff 100%);
    }
    body { display: grid; place-items: center; padding: 20px; }
    .card {
      width: min(520px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 20px 44px rgba(13, 33, 58, 0.12);
      padding: 28px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      color: #23517f;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--success);
    }
    h1 { margin: 18px 0 10px; font-size: 2rem; line-height: 1; }
    p { margin: 0; color: var(--muted); line-height: 1.6; }
    .actions { display: grid; gap: 12px; margin-top: 20px; }
    .button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 52px;
      border-radius: 18px;
      border: 1px solid var(--line);
      text-decoration: none;
      font-weight: 700;
      color: white;
      background: linear-gradient(180deg, #1983e2 0%, #0f6acb 100%);
    }
    .link {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 52px;
      border-radius: 18px;
      border: 1px solid var(--line);
      text-decoration: none;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.72);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">PaySpot Access</p>
    <h1>Connected</h1>
    <p>Your voucher is active. You will be redirected to the session page shortly.</p>
    <div class="actions">
      <a class="button" href="$(link-status)">Open session status</a>
      <a class="link" href="$(link-orig)">Continue browsing</a>
    </div>
  </main>
</body>
</html>
