<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portal Error</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #fff5d9 0%, #f7fafc 46%, #dcebff 100%);
      color: #102235;
    }
    .card {
      width: min(520px, 100%);
      padding: 28px;
      border-radius: 24px;
      background: rgba(252, 253, 255, 0.94);
      border: 1px solid rgba(17, 45, 76, 0.14);
      box-shadow: 0 20px 44px rgba(13, 33, 58, 0.12);
    }
    h1 { margin: 0 0 12px; }
    p { margin: 0; line-height: 1.6; color: #54657c; }
    a {
      display: inline-flex;
      margin-top: 18px;
      min-height: 50px;
      align-items: center;
      justify-content: center;
      width: 100%;
      border-radius: 18px;
      text-decoration: none;
      font-weight: 700;
      color: white;
      background: linear-gradient(180deg, #1983e2 0%, #0f6acb 100%);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hotspot error</h1>
    <p>$(error)</p>
    <a href="$(link-login)">Return to login</a>
  </main>
</body>
</html>
