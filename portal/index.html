<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PaySpot Voucher Portal</title>
  <style>
    :root {
      --ink: #112033;
      --muted: #4a5d77;
      --line: #d3dce9;
      --bg-a: #fff4d7;
      --bg-b: #dff0ff;
      --shell: #ffffff;
      --card: #f9fbff;
      --danger: #b42318;
      --focus: rgba(53, 117, 214, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, rgba(241, 188, 78, 0.38), transparent 34%),
        radial-gradient(circle at 85% 10%, rgba(68, 147, 255, 0.32), transparent 33%),
        linear-gradient(130deg, var(--bg-a) 0%, #f7f8ee 45%, var(--bg-b) 100%);
    }

    .wrap {
      width: min(560px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      padding: clamp(12px, 4vw, 20px);
      padding-left: max(clamp(12px, 4vw, 20px), env(safe-area-inset-left));
      padding-right: max(clamp(12px, 4vw, 20px), env(safe-area-inset-right));
      display: grid;
      place-items: center;
    }

    .panel {
      width: 100%;
      max-width: min(520px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-radius: 2px;
      background: rgba(244, 247, 251, 0.88);
      box-shadow: 0 8px 18px rgba(8, 23, 43, 0.16);
      padding: clamp(12px, 3.2vw, 14px) clamp(12px, 4vw, 24px) clamp(14px, 3.2vw, 16px);
      transform: translateY(28px);
      animation: fadeUp 0.6s ease both;
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.1;
      font-weight: 400;
      color: #2f3f58;
      text-align: left;
      letter-spacing: 0;
    }

    .field {
      margin-top: 10px;
    }

    label {
      display: block;
      margin: 0 0 7px;
      font-size: 0.84rem;
      color: #355173;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid #b9cadf;
      border-radius: 2px;
      padding: 9px 12px;
      min-height: 42px;
      font-size: 0.95rem;
      text-align: left;
      letter-spacing: 0.03em;
      outline: none;
      color: #374a66;
      background: #f3f5f9;
      box-shadow: inset 0 1px 2px rgba(19, 41, 68, 0.04);
      font-family: inherit;
      display: block;
    }

    input[type="text"]::placeholder {
      text-transform: none;
      letter-spacing: 0.01em;
      color: #687a93;
    }

    input[type="text"]:focus {
      border-color: #3575d6;
      box-shadow: 0 0 0 2px var(--focus);
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 2px;
      padding: 10px 14px;
      min-height: 44px;
      font-size: 1.05rem;
      line-height: 1.2;
      font-weight: 400;
      font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
      letter-spacing: 0;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(180deg, #2996dd 0%, #188bd8 100%);
      transition: transform 0.16s ease, filter 0.16s ease;
      box-shadow: 0 10px 16px rgba(23, 75, 142, 0.18);
      display: block;
      margin-top: 12px;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .btn:active {
      transform: translateY(0);
    }

    .hint {
      margin: 10px 0 0;
      min-height: 0;
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
    }

    .hint:empty {
      display: none;
    }

    .hint.error {
      color: var(--danger);
    }

    .buy-section {
      margin-top: 12px;
      border-top: 1px solid #bccce0;
      padding-top: 12px;
      text-align: center;
    }

    .buy-note {
      margin: 0;
      font-size: 0.82rem;
      color: #4e6381;
    }

    .buy-actions {
      margin-top: 7px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .buy-link {
      display: inline-flex;
      align-items: center;
      color: #1c4f90;
      font-weight: 600;
      text-decoration: none;
      overflow-wrap: anywhere;
      font-size: 0.86rem;
    }

    .copy-btn {
      border: 1px solid #1c4f90;
      background: #fff;
      color: #1c4f90;
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease, transform 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .copy-btn:hover {
      background: #edf5ff;
    }

    .copy-btn:active {
      transform: scale(0.96);
    }

    .copy-icon {
      width: 14px;
      height: 14px;
      display: block;
      fill: currentColor;
    }

    .check-icon {
      display: none;
    }

    .copy-btn.copied {
      color: #fff;
      border-color: #14935c;
      background: #14935c;
      animation: popCopy 0.35s ease;
    }

    .copy-btn.copied .copy-icon {
      display: none;
    }

    .copy-btn.copied .check-icon {
      display: block;
    }

    .copy-btn.copy-fail {
      color: #fff;
      border-color: #b42318;
      background: #b42318;
      animation: popCopy 0.35s ease;
    }

    @keyframes popCopy {
      0% {
        transform: scale(1);
      }
      45% {
        transform: scale(1.08);
      }
      100% {
        transform: scale(1);
      }
    }

    .buy-link:hover {
      color: #143f75;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(42px);
      }
      to {
        opacity: 1;
        transform: translateY(28px);
      }
    }

    @media (max-width: 760px) {
      .panel {
        transform: translateY(0);
        padding: 14px 12px;
      }

      .panel-title {
        font-size: 1.6rem;
      }

      input[type="text"] {
        font-size: 0.9rem;
      }

      .btn {
        font-size: 1rem;
      }

      .hint {
        font-size: 0.82rem;
      }
    }

    @media (max-width: 420px) {
      .buy-actions {
        width: 100%;
        justify-content: center;
      }

      .buy-note {
        font-size: 0.78rem;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
        <form id="voucher-form" autocomplete="off">
          <div class="field">
            <input id="voucherCode" name="voucherCode" type="text" maxlength="64" placeholder="Voucher Code" required />
          </div>
          <div class="field">
            <button id="connect-btn" class="btn" type="submit">Log In</button>
          </div>
        </form>

      <p id="oper-hint" class="hint"></p>
      <div class="buy-section">
        <p class="buy-note">Need a voucher code? Buy one using this link:</p>
        <div class="buy-actions">
          <a id="payment-link" class="buy-link" href="//payspot.abdxl.cloud/t/walstreet">Buy Voucher</a>
          <button id="copy-link-btn" class="copy-btn" type="button" aria-label="Copy payment link" title="Copy payment link">
            <svg class="copy-icon default-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H10V7h9v14z"/>
            </svg>
            <svg class="copy-icon check-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 16.2 4.8 12 3.4 13.4 9 19l12-12-1.4-1.4z"/>
            </svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
    var Ajax = {
      post: function (url, data, fn) {
        var xhr = new XMLHttpRequest();
        xhr.open("POST", url, true);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200 || xhr.status === 304) {
              fn(xhr.responseText);
            } else {
              fn(JSON.stringify({ errorCode: -1 }));
            }
          }
        };
        xhr.send(data);
      }
    };

    function getQueryStringAsObject() {
      var b, cv, e, k, ma, sk, v, r = {},
        d = function (v) { return decodeURIComponent(v); },
        q = window.location.search.substring(1),
        s = /([^&;=]+)=?([^&;]*)/g;
      ma = function (v) {
        if (typeof v !== "object") {
          cv = v;
          v = {};
          v.length = 0;
          if (cv) { Array.prototype.push.call(v, cv); }
        }
        return v;
      };
      while (e = s.exec(q)) {
        b = e[1].indexOf("[");
        v = d(e[2]);
        if (b < 0) {
          k = d(e[1]);
          if (r[k]) {
            r[k] = ma(r[k]);
            Array.prototype.push.call(r[k], v);
          } else {
            r[k] = v;
          }
        } else {
          k = d(e[1].slice(0, b));
          sk = d(e[1].slice(b + 1, e[1].indexOf("]", b)));
          r[k] = ma(r[k]);
          if (sk) { r[k][sk] = v; } else { Array.prototype.push.call(r[k], v); }
        }
      }
      return r;
    }

    function getQueryStringKey(key) {
      return getQueryStringAsObject()[key];
    }

    var errorHintMap = {
      "0": "Connected successfully. Redirecting...",
      "-1": "Network error. Please try again.",
      "-41500": "Invalid authentication type.",
      "-41501": "Authentication failed.",
      "-41502": "Incorrect voucher code.",
      "-41503": "Voucher code has expired.",
      "-41504": "Voucher data limit reached.",
      "-41505": "Maximum users reached for this voucher.",
      "-41507": "Authentication limit reached for today.",
      "-41518": "SSID not found. Reconnect and try again."
    };

    var state = {
      clientMac: getQueryStringKey("clientMac"),
      apMac: getQueryStringKey("apMac"),
      gatewayMac: getQueryStringKey("gatewayMac") || undefined,
      ssidName: getQueryStringKey("ssidName") || undefined,
      radioId: getQueryStringKey("radioId") ? Number(getQueryStringKey("radioId")) : undefined,
      vid: getQueryStringKey("vid") ? Number(getQueryStringKey("vid")) : undefined,
      originUrl: getQueryStringKey("originUrl"),
      previewSite: getQueryStringKey("previewSite"),
      landingUrl: undefined,
      ready: false,
      submitting: false
    };

    function setHint(message, isError) {
      var hint = document.getElementById("oper-hint");
      hint.className = isError ? "hint error" : "hint";
      hint.textContent = message || "";
    }

    function setNetworkMeta() {
      return;
    }

    function voucherAvailable(setting) {
      if (setting.authType === 3) {
        return true;
      }
      if (setting.authType === 11 && setting.hotspot && setting.hotspot.enabledTypes) {
        for (var i = 0; i < setting.hotspot.enabledTypes.length; i++) {
          if (Number(setting.hotspot.enabledTypes[i]) === 3) {
            return true;
          }
        }
      }
      return false;
    }

    function initPortal() {
      setNetworkMeta();

      Ajax.post(
        "/portal/getPortalPageSetting",
        JSON.stringify({
          clientMac: state.clientMac,
          apMac: state.apMac,
          gatewayMac: state.gatewayMac,
          ssidName: state.ssidName,
          radioId: state.radioId,
          vid: state.vid,
          originUrl: state.originUrl
        }),
        function (res) {
          var parsed;
          try {
            parsed = JSON.parse(res);
          } catch (err) {
            setHint("Unable to load portal settings.", true);
            return;
          }

          if (parsed.errorCode !== 0 || !parsed.result) {
            setHint(errorHintMap[String(parsed.errorCode)] || "Portal settings failed to load.", true);
            return;
          }

          state.landingUrl = parsed.result.landingUrl || state.originUrl || "/";

          if (!voucherAvailable(parsed.result)) {
            setHint("Voucher login is not enabled on this SSID. Enable Voucher auth in Omada portal settings.", true);
            return;
          }

          state.ready = true;
          if (state.previewSite) {
            setHint("Preview mode enabled. Authentication call is skipped in preview.", false);
          } else {
            setHint("Ready to connect.", false);
          }
        }
      );
    }

    function submitVoucher() {
      if (!state.ready || state.submitting) {
        return;
      }

      var voucherCode = document.getElementById("voucherCode").value;
      voucherCode = voucherCode ? voucherCode.replace(/^\s+|\s+$/g, "") : "";
      if (!voucherCode) {
        setHint("Please enter your voucher code.", true);
        return;
      }

      if (state.previewSite) {
        setHint("Preview mode: voucher submit disabled. Upload and test on a real portal redirect.", true);
        return;
      }

      state.submitting = true;
      setHint("Connecting...", false);

      Ajax.post(
        "/portal/auth",
        JSON.stringify({
          authType: 3,
          voucherCode: voucherCode,
          clientMac: state.clientMac,
          apMac: state.apMac,
          gatewayMac: state.gatewayMac,
          ssidName: state.ssidName,
          radioId: state.radioId,
          vid: state.vid,
          originUrl: state.originUrl
        }),
        function (res) {
          state.submitting = false;
          var parsed;
          try {
            parsed = JSON.parse(res);
          } catch (err) {
            setHint("Authentication failed. Invalid server response.", true);
            return;
          }

          if (parsed && parsed.errorCode === 0) {
            setHint(errorHintMap["0"], false);
            window.location.href = state.landingUrl;
            return;
          }

          setHint(errorHintMap[String(parsed.errorCode)] || "Authentication failed.", true);
        }
      );
    }

    document.getElementById("voucher-form").addEventListener("submit", function (event) {
      event.preventDefault();
      submitVoucher();
    });

    function writeToClipboard(text, onDone) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () {
          onDone(true);
        }, function () {
          onDone(false);
        });
        return;
      }

      var temp = document.createElement("textarea");
      temp.value = text;
      temp.setAttribute("readonly", "");
      temp.style.position = "absolute";
      temp.style.left = "-9999px";
      document.body.appendChild(temp);
      temp.select();

      var ok = false;
      try {
        ok = document.execCommand("copy");
      } catch (err) {
        ok = false;
      }

      document.body.removeChild(temp);
      onDone(ok);
    }

    document.getElementById("copy-link-btn").addEventListener("click", function () {
      var btn = this;
      var paymentLink = document.getElementById("payment-link");
      var text = paymentLink ? paymentLink.href : "";

      btn.disabled = true;
      writeToClipboard(text, function (ok) {
        btn.classList.remove("copied");
        btn.classList.remove("copy-fail");
        void btn.offsetWidth;
        if (ok) {
          btn.classList.add("copied");
        } else {
          btn.classList.add("copy-fail");
        }

        setTimeout(function () {
          btn.classList.remove("copied");
          btn.classList.remove("copy-fail");
          btn.disabled = false;
        }, 1200);
      });
    });

    initPortal();
  </script>
</body>
</html>
