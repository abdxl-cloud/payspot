<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PaySpot Voucher Portal</title>
  <style>
    :root {
      --ink: #112033;
      --muted: #4a5d77;
      --line: #d3dce9;
      --bg-a: #fff4d7;
      --bg-b: #dff0ff;
      --shell: #ffffff;
      --card: #f9fbff;
      --danger: #b42318;
      --focus: rgba(53, 117, 214, 0.2);
    }

    @import url("https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap");

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Sora", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, rgba(241, 188, 78, 0.38), transparent 34%),
        radial-gradient(circle at 85% 10%, rgba(68, 147, 255, 0.32), transparent 33%),
        linear-gradient(130deg, var(--bg-a) 0%, #f7f8ee 45%, var(--bg-b) 100%);
    }

    .wrap {
      max-width: 460px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 28px 18px;
      display: grid;
      place-items: center;
    }

    .panel {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 10px;
      background: linear-gradient(165deg, rgba(255, 255, 255, 0.95), rgba(248, 251, 255, 0.88));
      box-shadow: 0 14px 34px rgba(9, 23, 41, 0.14);
      backdrop-filter: blur(2px);
      padding: 18px 18px 16px;
      animation: fadeUp 0.6s ease both;
    }

    .field {
      margin-top: 12px;
    }

    label {
      display: block;
      margin: 0 0 7px;
      font-size: 0.84rem;
      color: #355173;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    input[type="text"] {
      width: 84%;
      max-width: 320px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: 0.14em;
      outline: none;
      color: #1e293b;
      background: #fdfefe;
      box-shadow: inset 0 1px 2px rgba(19, 41, 68, 0.04);
      font-family: "Sora", "Segoe UI", sans-serif;
      display: block;
      margin: 0 auto;
    }

    input[type="text"]:focus {
      border-color: #3575d6;
      box-shadow: 0 0 0 4px var(--focus);
    }

    .btn {
      width: 84%;
      max-width: 320px;
      border: 0;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #15437f 0%, #2464ad 100%);
      transition: transform 0.16s ease, filter 0.16s ease;
      box-shadow: 0 10px 18px rgba(23, 75, 142, 0.2);
      display: block;
      margin: 0 auto;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .btn:active {
      transform: translateY(0);
    }

    .hint {
      margin: 10px 0 0;
      min-height: 20px;
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
    }

    .hint.error {
      color: var(--danger);
    }

    .meta {
      margin: 7px 0 0;
      font-size: 0.77rem;
      color: #6d7f9c;
      text-align: center;
    }

    .buy-section {
      margin-top: 14px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
      text-align: center;
    }

    .buy-note {
      margin: 0;
      font-size: 0.82rem;
      color: #4e6381;
    }

    .buy-link {
      display: inline-block;
      margin-top: 8px;
      color: #1c4f90;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1.5px;
      overflow-wrap: anywhere;
    }

    .buy-link:hover {
      color: #143f75;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
        <form id="voucher-form" autocomplete="off">
          <div class="field">
            <input id="voucherCode" name="voucherCode" type="text" maxlength="64" placeholder="ENTER VOUCHER CODE" required />
          </div>
          <div class="field">
            <button id="connect-btn" class="btn" type="submit">Connect</button>
          </div>
        </form>

      <p id="oper-hint" class="hint"></p>
      <p id="network-meta" class="meta"></p>

      <div class="buy-section">
        <p class="buy-note">Need a voucher code? Buy one using this link:</p>
        <a class="buy-link" href="https://payspot.abdxl.cloud/t/walstreet">https://payspot.abdxl.cloud/t/walstreet</a>
      </div>
    </section>
  </main>

  <script>
    var Ajax = {
      post: function (url, data, fn) {
        var xhr = new XMLHttpRequest();
        xhr.open("POST", url, true);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200 || xhr.status === 304) {
              fn(xhr.responseText);
            } else {
              fn(JSON.stringify({ errorCode: -1 }));
            }
          }
        };
        xhr.send(data);
      }
    };

    function getQueryStringAsObject() {
      var b, cv, e, k, ma, sk, v, r = {},
        d = function (v) { return decodeURIComponent(v); },
        q = window.location.search.substring(1),
        s = /([^&;=]+)=?([^&;]*)/g;
      ma = function (v) {
        if (typeof v !== "object") {
          cv = v;
          v = {};
          v.length = 0;
          if (cv) { Array.prototype.push.call(v, cv); }
        }
        return v;
      };
      while (e = s.exec(q)) {
        b = e[1].indexOf("[");
        v = d(e[2]);
        if (b < 0) {
          k = d(e[1]);
          if (r[k]) {
            r[k] = ma(r[k]);
            Array.prototype.push.call(r[k], v);
          } else {
            r[k] = v;
          }
        } else {
          k = d(e[1].slice(0, b));
          sk = d(e[1].slice(b + 1, e[1].indexOf("]", b)));
          r[k] = ma(r[k]);
          if (sk) { r[k][sk] = v; } else { Array.prototype.push.call(r[k], v); }
        }
      }
      return r;
    }

    function getQueryStringKey(key) {
      return getQueryStringAsObject()[key];
    }

    var errorHintMap = {
      "0": "Connected successfully. Redirecting...",
      "-1": "Network error. Please try again.",
      "-41500": "Invalid authentication type.",
      "-41501": "Authentication failed.",
      "-41502": "Incorrect voucher code.",
      "-41503": "Voucher code has expired.",
      "-41504": "Voucher data limit reached.",
      "-41505": "Maximum users reached for this voucher.",
      "-41507": "Authentication limit reached for today.",
      "-41518": "SSID not found. Reconnect and try again."
    };

    var state = {
      clientMac: getQueryStringKey("clientMac"),
      apMac: getQueryStringKey("apMac"),
      gatewayMac: getQueryStringKey("gatewayMac") || undefined,
      ssidName: getQueryStringKey("ssidName") || undefined,
      radioId: getQueryStringKey("radioId") ? Number(getQueryStringKey("radioId")) : undefined,
      vid: getQueryStringKey("vid") ? Number(getQueryStringKey("vid")) : undefined,
      originUrl: getQueryStringKey("originUrl"),
      previewSite: getQueryStringKey("previewSite"),
      landingUrl: undefined,
      ready: false,
      submitting: false
    };

    function setHint(message, isError) {
      var hint = document.getElementById("oper-hint");
      hint.className = isError ? "hint error" : "hint";
      hint.textContent = message || "";
    }

    function setNetworkMeta() {
      var meta = [];
      if (state.ssidName) {
        meta.push("SSID: " + state.ssidName);
      }
      if (state.clientMac) {
        meta.push("Client: " + state.clientMac);
      }
      document.getElementById("network-meta").textContent = meta.join(" | ");
    }

    function voucherAvailable(setting) {
      if (setting.authType === 3) {
        return true;
      }
      if (setting.authType === 11 && setting.hotspot && setting.hotspot.enabledTypes) {
        for (var i = 0; i < setting.hotspot.enabledTypes.length; i++) {
          if (Number(setting.hotspot.enabledTypes[i]) === 3) {
            return true;
          }
        }
      }
      return false;
    }

    function initPortal() {
      setNetworkMeta();

      Ajax.post(
        "/portal/getPortalPageSetting",
        JSON.stringify({
          clientMac: state.clientMac,
          apMac: state.apMac,
          gatewayMac: state.gatewayMac,
          ssidName: state.ssidName,
          radioId: state.radioId,
          vid: state.vid,
          originUrl: state.originUrl
        }),
        function (res) {
          var parsed;
          try {
            parsed = JSON.parse(res);
          } catch (err) {
            setHint("Unable to load portal settings.", true);
            return;
          }

          if (parsed.errorCode !== 0 || !parsed.result) {
            setHint(errorHintMap[String(parsed.errorCode)] || "Portal settings failed to load.", true);
            return;
          }

          state.landingUrl = parsed.result.landingUrl || state.originUrl || "/";

          if (!voucherAvailable(parsed.result)) {
            setHint("Voucher login is not enabled on this SSID. Enable Voucher auth in Omada portal settings.", true);
            return;
          }

          state.ready = true;
          if (state.previewSite) {
            setHint("Preview mode enabled. Authentication call is skipped in preview.", false);
          } else {
            setHint("Ready to connect.", false);
          }
        }
      );
    }

    function submitVoucher() {
      if (!state.ready || state.submitting) {
        return;
      }

      var voucherCode = document.getElementById("voucherCode").value;
      voucherCode = voucherCode ? voucherCode.replace(/^\s+|\s+$/g, "") : "";
      if (!voucherCode) {
        setHint("Please enter your voucher code.", true);
        return;
      }

      if (state.previewSite) {
        setHint("Preview mode: voucher submit disabled. Upload and test on a real portal redirect.", true);
        return;
      }

      state.submitting = true;
      setHint("Connecting...", false);

      Ajax.post(
        "/portal/auth",
        JSON.stringify({
          authType: 3,
          voucherCode: voucherCode,
          clientMac: state.clientMac,
          apMac: state.apMac,
          gatewayMac: state.gatewayMac,
          ssidName: state.ssidName,
          radioId: state.radioId,
          vid: state.vid,
          originUrl: state.originUrl
        }),
        function (res) {
          state.submitting = false;
          var parsed;
          try {
            parsed = JSON.parse(res);
          } catch (err) {
            setHint("Authentication failed. Invalid server response.", true);
            return;
          }

          if (parsed && parsed.errorCode === 0) {
            setHint(errorHintMap["0"], false);
            window.location.href = state.landingUrl;
            return;
          }

          setHint(errorHintMap[String(parsed.errorCode)] || "Authentication failed.", true);
        }
      );
    }

    document.getElementById("voucher-form").addEventListener("submit", function (event) {
      event.preventDefault();
      submitVoucher();
    });

    initPortal();
  </script>
</body>
</html>
